# Cloudflare Workers static-assets deployment.
# Assets-only project: no Worker script, wrangler serves ./dist directly.
# Deploy: `bun run build` then `wrangler deploy` (or `bun run deploy`).
name = "markd-site"
compatibility_date = "2025-10-01"

[assets]
directory = "./dist"
# Serve the SPA-less static site; unknown paths fall through to Astro's 404.
not_found_handling = "404-page"
